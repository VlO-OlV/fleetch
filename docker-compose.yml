services:
  nginx:
    image: nginx:alpine
    container_name: fleetch-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443" (SSL)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/configs:/etc/nginx/configs:ro
      # - ./certs:/etc/nginx/certs:ro  (SSL certificates)
    networks:
      - proxy-net
    depends_on:
      - backend
      - frontend

  backend:
    container_name: fleetch-backend
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/api/.env.production
    networks:
      - proxy-net
      - backend-net
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT}/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    container_name: fleetch-frontend
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/web/.env.production
    networks:
      - proxy-net
    depends_on:
      backend:
        condition: service_healthy
  
  postgresql:
    image: postgres:16
    container_name: fleetch-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  
  redis:
    image: redis:8
    container_name: fleetch-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: redis-server --save 60 1000 --appendonly yes --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
  redis_data:

networks:
  proxy-net:
    driver: bridge
  backend-net:
    driver: bridge